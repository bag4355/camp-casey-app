services:
  - type: web
    name: camp-casey-app
    env: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /health
    envVars:
      # App identity
      - key: APP_NAME
        value: Camp Casey Information App
      - key: APP_VERSION
        value: "0.1.0"

      # Timezone / locale
      - key: APP_TIMEZONE
        value: Asia/Seoul
      - key: DEFAULT_LOCALE
        value: ko

      # Defaults
      - key: DEFAULT_BUS_STOP_QUERY
        value: CAC
      - key: DEFAULT_TRAIN_PROVIDER
        value: bosan
      - key: DEFAULT_USD_TO_KRW
        value: "1380"

      # Persistent volume path (must match disk mountPath below)
      - key: DATA_ROOT
        value: /var/data/camp-casey

      # CORS - restrict to your actual domain once deployed
      # Example: https://camp-casey.example.com
      - key: CORS_ALLOWED_ORIGINS
        value: "*"

      # OpenAI - set manually in Render dashboard (never commit real key)
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_CHAT_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small

    disk:
      name: camp-casey-data
      mountPath: /var/data
      sizeGB: 1
