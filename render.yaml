services:
  - type: web
    name: camp-casey-app
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      # App identity
      - key: APP_NAME
        value: Camp Casey Information App
      - key: APP_VERSION
        value: "0.1.0"

      # Timezone / locale
      - key: APP_TIMEZONE
        value: Asia/Seoul
      - key: DEFAULT_LOCALE
        value: ko

      # Defaults
      - key: DEFAULT_BUS_STOP_QUERY
        value: CAC
      - key: DEFAULT_TRAIN_PROVIDER
        value: bosan
      - key: DEFAULT_USD_TO_KRW
        value: "1380"

      # DATA_ROOT를 설정하지 않으면 Docker 이미지 내 번들 데이터(/app/data)를 사용한다.
      # 무료 플랜은 Persistent Disk를 지원하지 않으므로 번들 데이터로 운영한다.
      # 단, 환율 수동 변경값은 재시작 시 DEFAULT_USD_TO_KRW로 초기화된다.

      # CORS - 배포 후 실제 도메인으로 변경 권장
      - key: CORS_ALLOWED_ORIGINS
        value: "*"

      # OpenAI - Render 대시보드 Environment 탭에서 직접 입력 (절대 코드에 넣지 말 것)
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_CHAT_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
