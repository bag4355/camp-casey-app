<!DOCTYPE html>
<html lang="{{ default_locale }}" data-locale="{{ default_locale }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="theme-color" content="#18181B" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>{{ app_name }}</title>
    <meta name="description" content="Camp Casey / Hovey / Bosan helper app" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Inter:wght@400;500;600;700;800;900&display=swap" />
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body>
    {% block body %}{% endblock %}
    <script>
      window.__APP_BOOT__ = {
        defaultLocale: {{ default_locale | tojson }},
        appName: {{ app_name | tojson }}
      };
    </script>
    <script src="/static/app.js" defer></script>
  </body>
</html>
